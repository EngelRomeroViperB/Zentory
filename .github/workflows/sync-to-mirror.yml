name: Sincronización Automática a Repositorio Espejo

on:
  push:
    branches:
      - main

jobs:
  push-to-mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push a repositorio espejo
        run: |
          # CONFIGURACIÓN REQUERIDA:
          # 1. Reemplaza USUARIO_DESTINO con tu usuario de GitHub de destino
          # 2. Reemplaza NOMBRE_REPO con el nombre del repositorio de destino
          # 3. Crea un secret en GitHub llamado TOKEN_CUENTA_B con un Personal Access Token
          #    de la cuenta de destino con permisos 'repo' (full control)
          git push --force https://${{ secrets.TOKEN_CUENTA_B }}@github.com/USUARIO_DESTINO/NOMBRE_REPO.git
