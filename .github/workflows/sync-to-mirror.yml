name: Sincronización Automática a V1perBite

on:
  push:
    branches:
      - main

jobs:
  push-to-mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push a repositorio espejo (V1perBite)
        run: |
          # CONFIGURACIÓN REQUERIDA:
          # Crea un secret en GitHub (V1perB1te) llamado TOKEN_V1PERBITE
          # con un Personal Access Token de la cuenta V1perBite con permisos 'repo'
          git push --force https://${{ secrets.TOKEN_V1PERBITE }}@github.com/V1perBite/Zentory.git main
